name: 🤖 Sync Pinned Projects to README

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main
      - master

jobs:
  update-readme:
    name: Update README with Pinned Repos
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to commit and push changes back to the repo

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔄 Fetch pinned repos & update README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_projects.py

      - name: 💾 Commit & push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Projects synced from pinned repos [skip ci]"
          git push
